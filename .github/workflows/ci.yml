name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -e ".[dev]" pytest-timeout
      - name: Lint (ruff)
        run: ruff check src tests scripts
      - name: Type-check (mypy)
        run: mypy src || true   # advisory until stricter coverage
      - name: Test (pytest)
        run: pytest --cov=src --cov-report=term-missing

  rust:
    name: Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable]
    defaults:
      run:
        working-directory: executor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: executor
      - name: fmt
        run: cargo fmt -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        run: cargo build --release
      - name: test
        run: cargo test --release

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [python, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: hip4-dashboard:ci
      - name: Build executor image
        uses: docker/build-push-action@v6
        with:
          context: ./executor
          file: ./executor/Dockerfile
          push: false
          tags: hip4-executor:ci
