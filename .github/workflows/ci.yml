name: CI

# Triggers
# - PR to main: blocks the merge button, runs unit tests + lint
# - push to main: post-merge confirmation
# Push to feature branches (claude/**, etc.) does NOT trigger the workflow,
# so working commits don't spam failure emails before a PR is opened.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs of the same ref when a new commit lands —
# eliminates duplicate emails on rapid push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -e ".[dev]" pytest-timeout
      - name: Lint (ruff)
        run: ruff check src tests scripts
      - name: Type-check (mypy)
        run: mypy src || true   # advisory until stricter coverage
      - name: Test (pytest)
        run: pytest --cov=src --cov-report=term-missing

  rust:
    name: Rust ${{ matrix.rust }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable]
    defaults:
      run:
        working-directory: executor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: executor
      - name: fmt
        run: cargo fmt -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        run: cargo build --release
      - name: test
        run: cargo test --release

# NOTE: Docker images are built locally (`make docker-build`) before
# deployment, not in CI. Docker build is a deployment concern; CI here
# is for code correctness only. If you want CI to also build images,
# add a `docker.yml` workflow with `workflow_dispatch` so it runs only
# on demand and never emails on failure for normal PRs.
