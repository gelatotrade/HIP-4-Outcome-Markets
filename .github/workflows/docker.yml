name: Docker images (manual)

# Manual-only — you trigger this from the Actions tab when you want to
# pre-flight the Dockerfiles. It NEVER runs on push or pull_request, so
# Docker build flakes never produce failure emails.
on:
  workflow_dispatch:

jobs:
  build:
    name: Build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: hip4-dashboard:ci
      - name: Build executor image
        uses: docker/build-push-action@v6
        with:
          context: ./executor
          file: ./executor/Dockerfile
          push: false
          tags: hip4-executor:ci
